services:
  - type: web
    name: life-simulator-back
    runtime: ruby
    plan: free
    region: oregon
    rootDir: back
    buildCommand: ./bin/render-build.sh
    startCommand: bundle exec puma -C config/puma.rb
    healthCheckPath: /up
    buildFilter:
      paths:
        - back/**
    envVars:
      - key: RAILS_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: life-simulator-db
          property: connectionString
      - key: RAILS_MASTER_KEY
        sync: false
      - key: WEB_CONCURRENCY
        value: "2"
      - key: RAILS_LOG_LEVEL
        value: info

  - type: web
    name: life-simulator-front
    runtime: static
    rootDir: front
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    buildFilter:
      paths:
        - front/**
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE_URL
        sync: false

databases:
  - name: life-simulator-db
    plan: free
    region: oregon
